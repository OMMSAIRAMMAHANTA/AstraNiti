<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>Inventory – Roommate Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0b1120;
            min-height: 100vh;
            color: #e2e8f0;
            padding: 1.5rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.5);
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-area i {
            font-size: 2rem;
            color: #818cf8;
        }

        .logo-area h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(145deg, #f0f9ff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-link {
            color: #94a3b8;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #818cf8;
        }

        /* Add item form */
        .add-item-section {
            background: rgba(255,255,255,0.02);
            border-radius: 32px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px dashed #4f46e5;
        }

        .form-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .form-group {
            flex: 1 1 150px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #cbd5e1;
            font-size: 0.9rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            background: rgba(15, 23, 42, 0.8); /* Fixed background */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 12px 16px;
            color: white;
            outline: none;
        }

        /* FIXED: Dropdown visibility */
        select option {
            background-color: #1e293b;
            color: white;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #818cf8;
        }

        .btn-primary {
            background: linear-gradient(145deg, #4f46e5, #7c3aed);
            border: none;
            border-radius: 60px;
            padding: 12px 28px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 20px -5px rgba(79,70,229,0.5);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px -5px rgba(79,70,229,0.7);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 60px;
            padding: 8px 16px;
            color: #cbd5e1;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .btn-danger {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #f87171;
        }
        .btn-danger:hover {
            background: rgba(239,68,68,0.2);
            border-color: #ef4444;
            color: #fecaca;
        }

        /* Inventory grid */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin-top: 1.5rem;
        }

        .inventory-card {
            background: rgba(255,255,255,0.02);
            border-radius: 28px;
            padding: 1.2rem;
            border: 1px solid rgba(255,255,255,0.03);
            transition: all 0.2s;
        }

        .inventory-card:hover {
            background: rgba(255,255,255,0.04);
            border-color: rgba(129,140,248,0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .item-name {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .item-category {
            background: rgba(129,140,248,0.1);
            color: #a5b4fc;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .quantity-display {
            display: flex;
            align-items: baseline;
            gap: 5px;
            margin: 0.8rem 0;
        }

        .current-qty {
            font-size: 2rem;
            font-weight: 700;
        }

        .unit { color: #94a3b8; }
        .min-qty { font-size: 0.9rem; color: #94a3b8; }

        .low-stock-badge {
            background: #f9731620;
            color: #fb923c;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .update-form {
            display: flex;
            gap: 5px;
            margin-top: 0.8rem;
        }

        .update-form input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 8px 12px;
            color: white;
            width: 100px;
        }

        .hidden { display: none !important; }

        .error-message {
            color: #f87171;
            margin: 1rem 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-bar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 1.5rem 0;
        }

        .filter-bar select, .filter-bar input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 10px 16px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="header">
            <div class="logo-area">
                <i class="fas fa-boxes"></i>
                <h1>Inventory</h1>
            </div>
            <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Dashboard</a>
        </div>

        <!-- Add new item form -->
        <div class="add-item-section">
            <h3 style="margin-bottom: 1rem;"><i class="fas fa-plus-circle"></i> Add new item</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Item name</label>
                    <input type="text" id="newItemName" placeholder="e.g., Milk">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="newItemCategory">
                        <option value="groceries">Groceries</option>
                        <option value="vegetables">Vegetables</option>
                        <option value="fruits">Fruits</option>
                        <option value="dairy">Dairy</option>
                        <option value="meat">Meat</option>
                        <option value="cleaning">Cleaning</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="newItemQty" step="0.01" min="0" value="1">
                </div>
                <div class="form-group">
                    <label>Unit</label>
                    <select id="newItemUnit">
                        <option value="piece">piece</option>
                        <option value="kg">kg</option>
                        <option value="liter">liter</option>
                        <option value="pack">pack</option>
                        <option value="bottle">bottle</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Min quantity (alert)</label>
                    <input type="number" id="newItemMin" step="0.01" min="0" value="1">
                </div>
                <button class="btn-primary" onclick="addItem()"><i class="fas fa-save"></i> Add to inventory</button>
            </div>
            <div id="addError" class="error-message"></div>
        </div>

        <!-- Filter / search -->
        <div class="filter-bar">
            <select id="categoryFilter" onchange="filterItems()">
                <option value="">All categories</option>
                <option value="groceries">Groceries</option>
                <option value="vegetables">Vegetables</option>
                <option value="fruits">Fruits</option>
                <option value="dairy">Dairy</option>
                <option value="meat">Meat</option>
                <option value="cleaning">Cleaning</option>
                <option value="other">Other</option>
            </select>
            <input type="text" id="searchFilter" placeholder="Search items..." oninput="filterItems()">
            <button class="btn-secondary" onclick="filterItems()"><i class="fas fa-filter"></i> Apply</button>
            <button class="btn-secondary" onclick="resetFilters()"><i class="fas fa-times"></i> Clear</button>
        </div>

        <!-- Low stock alert summary -->
        <div id="lowStockSummary" class="error-message" style="justify-content: center;"></div>

        <!-- Inventory grid -->
        <div id="inventoryContainer" class="inventory-grid">
            <!-- Populated by JS -->
        </div>
    </div>

    <script>
        const host = window.location.hostname;
        const API_BASE = `http://${host}:5000/api`;
        
        let inventory = [];
        let filteredInventory = [];

        function isLoggedIn() {
            return localStorage.getItem('isLoggedIn') === 'true';
        }

        if (!isLoggedIn()) {
            window.location.href = 'index.html';
        }

        async function sessionFetch(url, options = {}) {
            if (!isLoggedIn()) {
                window.location.href = 'index.html';
                return null;
            }
            try {
                const response = await fetch(url, {
                    ...options,
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    }
                });
                if (response.status === 401) {
                    localStorage.removeItem('isLoggedIn');
                    localStorage.removeItem('user');
                    window.location.href = 'index.html';
                    return null;
                }
                return response;
            } catch (err) {
                console.error('Network error:', err);
                throw err;
            }
        }

        async function loadInventory() {
            try {
                const res = await sessionFetch(`${API_BASE}/inventory`, { method: 'GET' });
                if (!res) return;
                
                const data = await res.json();
                if (data.success) {
                    inventory = data.data.inventory || [];
                    filteredInventory = [...inventory];
                    renderInventory();
                    updateLowStockSummary(data.data.low_stock || []);
                }
            } catch (err) {
                console.error(err);
            }
        }

        function renderInventory() {
            const container = document.getElementById('inventoryContainer');
            if (filteredInventory.length === 0) {
                container.innerHTML = '<div class="inventory-card">No items found. Add some!</div>';
                return;
            }

            container.innerHTML = filteredInventory.map(item => {
                const lowStock = item.quantity < item.min_quantity;
                return `
                    <div class="inventory-card" id="item-${item.item_id}">
                        <div class="card-header">
                            <span class="item-name"><i class="fas fa-cube"></i> ${item.item_name}</span>
                            <span class="item-category">${item.category || 'other'}</span>
                        </div>
                        <div class="quantity-display">
                            <span class="current-qty">${item.quantity}</span>
                            <span class="unit">${item.unit}</span>
                            ${lowStock ? '<span class="low-stock-badge"><i class="fas fa-exclamation-triangle"></i> Low</span>' : ''}
                        </div>
                        <div class="min-qty">Min: ${item.min_quantity} ${item.unit}</div>
                        <div class="card-actions">
                            <button class="btn-secondary" onclick="showUpdateForm(${item.item_id})"><i class="fas fa-pen"></i> Update</button>
                            <button class="btn-secondary btn-danger" onclick="deleteItem(${item.item_id})"><i class="fas fa-trash"></i> Delete</button>
                        </div>
                        <div id="update-form-${item.item_id}" class="update-form hidden">
                            <input type="number" id="update-qty-${item.item_id}" step="0.01" min="0" placeholder="New quantity">
                            <button class="btn-secondary" onclick="updateQuantity(${item.item_id})">Save</button>
                            <button class="btn-secondary" onclick="hideUpdateForm(${item.item_id})">Cancel</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function showUpdateForm(itemId) {
            document.getElementById(`update-form-${itemId}`).classList.remove('hidden');
        }
        function hideUpdateForm(itemId) {
            document.getElementById(`update-form-${itemId}`).classList.add('hidden');
        }

        async function updateQuantity(itemId) {
            const newQty = parseFloat(document.getElementById(`update-qty-${itemId}`).value);
            if (isNaN(newQty) || newQty < 0) return;

            try {
                const res = await sessionFetch(`${API_BASE}/inventory/${itemId}/consume`, {
                    method: 'POST',
                    body: JSON.stringify({ quantity: newQty })
                });
                if (!res) return;
                const data = await res.json();
                if (data.success) {
                    hideUpdateForm(itemId);
                    loadInventory();
                } else {
                    alert('Update failed');
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function deleteItem(itemId) {
            if (!confirm('Delete this item?')) return;
            try {
                const res = await sessionFetch(`${API_BASE}/inventory/${itemId}`, {
                    method: 'DELETE'
                });
                if (!res) return;
                const data = await res.json();
                if (data.success) {
                    loadInventory();
                } else {
                    alert('Delete failed');
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function addItem() {
            const name = document.getElementById('newItemName').value.trim();
            const category = document.getElementById('newItemCategory').value;
            const qty = parseFloat(document.getElementById('newItemQty').value);
            const unit = document.getElementById('newItemUnit').value;
            const min = parseFloat(document.getElementById('newItemMin').value);
            const errorEl = document.getElementById('addError');

            if (!name || isNaN(qty) || isNaN(min)) {
                errorEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please fill all fields correctly.';
                return;
            }

            try {
                const res = await sessionFetch(`${API_BASE}/inventory`, {
                    method: 'POST',
                    body: JSON.stringify({
                        item_name: name,
                        category,
                        quantity: qty,
                        unit,
                        min_quantity: min
                    })
                });
                if (!res) return;
                const data = await res.json();
                if (data.success) {
                    document.getElementById('newItemName').value = '';
                    loadInventory();
                } else {
                    errorEl.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${data.error || 'Failed to add'}`;
                }
            } catch (err) {
                errorEl.innerHTML = '<i class="fas fa-exclamation-circle"></i> Network error';
            }
        }

        function filterItems() {
            const category = document.getElementById('categoryFilter').value;
            const search = document.getElementById('searchFilter').value.toLowerCase();
            filteredInventory = inventory.filter(item => {
                const matchCategory = !category || item.category === category;
                const matchSearch = !search || item.item_name.toLowerCase().includes(search);
                return matchCategory && matchSearch;
            });
            renderInventory();
        }

        function resetFilters() {
            document.getElementById('categoryFilter').value = '';
            document.getElementById('searchFilter').value = '';
            filteredInventory = [...inventory];
            renderInventory();
        }

        function updateLowStockSummary(lowStock) {
            const summary = document.getElementById('lowStockSummary');
            summary.innerHTML = lowStock.length > 0 ? `<i class="fas fa-exclamation-triangle"></i> ${lowStock.length} item(s) are running low.` : '';
        }

        loadInventory();
    </script>
</body>
</html>
