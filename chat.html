<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>Chat – Roommate Manager</title>
    <!-- Socket.IO client -->
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0b1120;
            min-height: 100vh;
            color: #e2e8f0;
            padding: 1.5rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.5);
            max-width: 1000px;
            margin: 0 auto;
            height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-area i {
            font-size: 2rem;
            color: #818cf8;
        }

        .logo-area h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(145deg, #f0f9ff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-link {
            color: #94a3b8;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #818cf8;
        }

        /* Chat container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: rgba(255,255,255,0.02);
            border-radius: 28px;
            margin: 1rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 80%;
        }

        .message.own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 40px;
            background: linear-gradient(145deg, #4f46e5, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .message-content {
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .message.own .message-content {
            background: #4f46e5;
            color: white;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
            font-size: 0.85rem;
        }

        .sender-name {
            font-weight: 600;
        }

        .timestamp {
            color: #94a3b8;
            font-size: 0.75rem;
        }

        .message-text {
            word-break: break-word;
        }

        .system-message {
            background: rgba(129,140,248,0.1);
            border: 1px dashed #4f46e5;
            text-align: center;
            color: #a5b4fc;
            align-self: center;
            max-width: 90%;
            font-style: italic;
        }

        .mention {
            background: #fbbf2420;
            color: #fbbf24;
            padding: 2px 6px;
            border-radius: 40px;
            font-weight: 600;
        }

        /* Input area */
        .input-area {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            background: rgba(255,255,255,0.02);
            border-radius: 60px;
            padding: 0.5rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .input-area input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem 1.2rem;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        .input-area input::placeholder {
            color: #475569;
        }

        .input-area button {
            background: #4f46e5;
            border: none;
            border-radius: 60px;
            padding: 0.8rem 1.8rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-area button:hover {
            background: #6366f1;
            transform: scale(1.02);
        }

        .mention-suggestions {
            background: rgba(0,0,0,0.8);
            border-radius: 40px;
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .mention-suggestion {
            background: rgba(255,255,255,0.1);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            cursor: pointer;
        }

        .mention-suggestion:hover {
            background: #4f46e5;
        }

        .hidden {
            display: none !important;
        }

        .loader {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="header">
            <div class="logo-area">
                <i class="fas fa-comments"></i>
                <h1>Room Chat</h1>
            </div>
            <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Dashboard</a>
        </div>

        <!-- Chat messages container -->
        <div class="chat-container" id="chatContainer">
            <!-- Messages will appear here -->
        </div>

        <!-- Mention suggestions (when typing @) -->
        <div id="mentionSuggestions" class="mention-suggestions hidden"></div>

        <!-- Input area -->
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message... (Use @ to mention)" autocomplete="off">
            <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Send</button>
        </div>
    </div>

    <script>
        // FIXED: Dynamic URLs to match localhost or 127.0.0.1
        const host = window.location.hostname;
        const API_BASE = `http://${host}:5000/api`;
        const SOCKET_URL = `http://${host}:5000`; 

        let socket = null;
        let currentUser = null;
        let roommates = [];
        let roomCode = null;

        // Check if user is logged in
        function isLoggedIn() {
            return localStorage.getItem('isLoggedIn') === 'true';
        }

        function getUser() {
            const userStr = localStorage.getItem('user');
            if (userStr) {
                try {
                    currentUser = JSON.parse(userStr);
                } catch (e) {}
            }
        }
        
        getUser();

        if (!isLoggedIn() || !currentUser) {
            window.location.href = 'index.html';
        }

        // FIXED: Custom session fetch that handles cookies and 401 redirects
        async function sessionFetch(url, options = {}) {
            if (!isLoggedIn()) {
                window.location.href = 'index.html';
                return null;
            }
            try {
                const response = await fetch(url, {
                    ...options,
                    credentials: 'include',  // Important for session cookies
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    }
                });
                if (response.status === 401) {
                    console.error("Session expired or invalid cookie, redirecting...");
                    localStorage.removeItem('isLoggedIn');
                    localStorage.removeItem('user');
                    window.location.href = 'index.html';
                    return null;
                }
                return response;
            } catch (err) {
                console.error('Network error:', err);
                throw err;
            }
        }

        // Fetch roommates for mentions
        async function loadRoommates() {
            try {
                const res = await sessionFetch(`${API_BASE}/users/roommates`, { method: 'GET' });
                if (!res) return;
                
                const data = await res.json();
                if (data.success) {
                    roommates = data.data.roommates || [];
                }
            } catch (err) {
                console.error(err);
            }
        }

        // Load chat history
        async function loadChatHistory() {
            try {
                const res = await sessionFetch(`${API_BASE}/chat/messages`, { method: 'GET' });
                if (!res) return;
                
                const data = await res.json();
                if (data.success) {
                    renderMessages(data.data.messages || []);
                }
            } catch (err) {
                console.error(err);
            }
        }

        // Render messages
        function renderMessages(messages) {
            const container = document.getElementById('chatContainer');
            container.innerHTML = '';
            messages.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
            messages.forEach(msg => {
                const isOwn = msg.sender_id === currentUser?.user_id;
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${isOwn ? 'own' : ''} ${msg.message_type === 'system' ? 'system-message' : ''}`;

                const avatar = !isOwn && msg.message_type !== 'system' ? `<div class="avatar">${(msg.sender_name?.[0] || '?')}</div>` : '';

                let content = msg.message_text || '';
                // Highlight mentions
                if (msg.mentions && msg.mentions.length) {
                    msg.mentions.forEach(m => {
                        content = content.replace(new RegExp(`@${m.full_name}`, 'g'), `<span class="mention">@${m.full_name}</span>`);
                    });
                }

                const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                msgDiv.innerHTML = `
                    ${avatar}
                    <div class="message-content">
                        <div class="message-header">
                            <span class="sender-name">${msg.sender_name || 'System'}</span>
                            <span class="timestamp">${time}</span>
                        </div>
                        <div class="message-text">${content}</div>
                    </div>
                `;
                container.appendChild(msgDiv);
            });
            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        // Socket.IO setup
        function initSocket() {
            socket = io(SOCKET_URL, {
                transports: ['websocket'],
                withCredentials: true // Ensures session cookies are sent with WebSocket connections!
            });

            socket.on('connect', () => {
                console.log('Connected to chat server');
                // Join room
                socket.emit('join_room', {
                    room_code: currentUser.room_code,
                    user_id: currentUser.user_id
                });
            });

            socket.on('new_message', (msg) => {
                // Prepend or append? We'll append and scroll
                const container = document.getElementById('chatContainer');
                const isOwn = msg.sender_id === currentUser?.user_id;
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${isOwn ? 'own' : ''}`;

                const avatar = !isOwn ? `<div class="avatar">${(msg.sender_name?.[0] || '?')}</div>` : '';

                let content = msg.message || '';
                if (msg.mentions && msg.mentions.length) {
                    msg.mentions.forEach(m => {
                        content = content.replace(new RegExp(`@${m}`, 'g'), `<span class="mention">@${m}</span>`);
                    });
                }

                const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                msgDiv.innerHTML = `
                    ${avatar}
                    <div class="message-content">
                        <div class="message-header">
                            <span class="sender-name">${msg.sender_name || 'User'}</span>
                            <span class="timestamp">${time}</span>
                        </div>
                        <div class="message-text">${content}</div>
                    </div>
                `;
                container.appendChild(msgDiv);
                container.scrollTop = container.scrollHeight;
            });

            socket.on('user_joined', (data) => {
                console.log(data.message);
            });
        }

        // Send message
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !socket) return;

            // Detect mentions (simple: @username)
            const mentionNames = [];
            const words = text.split(' ');
            words.forEach(word => {
                if (word.startsWith('@')) {
                    const name = word.substring(1);
                    const matched = roommates.find(r => r.full_name.toLowerCase() === name.toLowerCase());
                    if (matched) mentionNames.push(matched.full_name);
                }
            });

            socket.emit('send_message', {
                room_code: currentUser.room_code,
                sender_id: currentUser.user_id,
                message: text,
                mentions: mentionNames
            });

            input.value = '';
        }

        // Add Enter key listener for sending message
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Mention autocomplete (simplified)
        document.getElementById('messageInput').addEventListener('input', function(e) {
            const text = e.target.value;
            const lastAt = text.lastIndexOf('@');
            if (lastAt !== -1 && (lastAt === 0 || text[lastAt-1] === ' ')) {
                const query = text.substring(lastAt+1).split(' ')[0].toLowerCase();
                if (query.length > 0) {
                    const matches = roommates.filter(r => r.full_name.toLowerCase().startsWith(query));
                    if (matches.length) {
                        const suggDiv = document.getElementById('mentionSuggestions');
                        suggDiv.innerHTML = '';
                        matches.forEach(m => {
                            const chip = document.createElement('span');
                            chip.className = 'mention-suggestion';
                            chip.textContent = `@${m.full_name}`;
                            chip.onclick = () => {
                                // Replace the @query with @fullname
                                const before = text.substring(0, lastAt+1);
                                const after = text.substring(lastAt+1+query.length);
                                input.value = before + m.full_name + after + ' ';
                                suggDiv.classList.add('hidden');
                                input.focus();
                            };
                            suggDiv.appendChild(chip);
                        });
                        suggDiv.classList.remove('hidden');
                        return;
                    }
                }
            }
            document.getElementById('mentionSuggestions').classList.add('hidden');
        });

        // Initialize
        Promise.all([loadRoommates(), loadChatHistory()]).then(() => {
            initSocket();
        });
    </script>
</body>
</html>
