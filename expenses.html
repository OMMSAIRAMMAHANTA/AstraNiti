<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>Expense History – Roommate Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0b1120;
            min-height: 100vh;
            color: #e2e8f0;
            padding: 1.5rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.5);
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-area i {
            font-size: 2rem;
            color: #818cf8;
        }

        .logo-area h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(145deg, #f0f9ff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-link {
            color: #94a3b8;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #818cf8;
        }

        /* Filter bar */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin-bottom: 2rem;
            align-items: center;
            background: rgba(255,255,255,0.02);
            padding: 1.2rem 1.8rem;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group label {
            color: #94a3b8;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .filter-group input, .filter-group select {
            background: rgba(15, 23, 42, 0.8); /* Fixed background for dropdowns */
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 10px 16px;
            color: white;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        /* FIXED: Dropdown options visibility */
        .filter-group select option {
            background-color: #1e293b; /* Dark background for options */
            color: white;
            padding: 10px;
        }

        .filter-group input:focus, .filter-group select:focus {
            border-color: #818cf8;
        }

        .btn-primary {
            background: linear-gradient(145deg, #4f46e5, #7c3aed);
            border: none;
            border-radius: 60px;
            padding: 10px 24px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 20px -5px rgba(79,70,229,0.5);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px -5px rgba(79,70,229,0.7);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 60px;
            padding: 10px 20px;
            color: #cbd5e1;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        /* Expense list */
        .expenses-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .expense-row {
            background: rgba(255,255,255,0.02);
            border-radius: 28px;
            padding: 1.2rem 1.5rem;
            display: grid;
            grid-template-columns: 2fr 1fr 1.5fr 1fr 1fr auto;
            align-items: center;
            gap: 1rem;
            border: 1px solid rgba(255,255,255,0.03);
            transition: all 0.2s;
        }

        .expense-row:hover {
            background: rgba(255,255,255,0.04);
            border-color: rgba(129,140,248,0.3);
        }

        @media (max-width: 900px) {
            .expense-row {
                grid-template-columns: 1fr 1fr;
                gap: 0.8rem;
            }
            .expense-description { grid-column: span 2; }
            .expense-actions { grid-column: span 2; justify-self: end; }
            .filter-bar { border-radius: 32px; padding: 1.5rem; }
        }

        .expense-description {
            font-weight: 600;
            color: white;
        }

        .expense-category {
            font-size: 0.85rem;
            color: #94a3b8;
            text-transform: capitalize;
        }

        .expense-amount {
            font-weight: 700;
            font-size: 1.2rem;
            color: #fbbf24;
        }

        .expense-paidby {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.95rem;
        }

        .expense-date {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .expense-status {
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            width: fit-content;
        }

        .status-settled { background: #10b98120; color: #34d399; }
        .status-pending { background: #f9731620; color: #fb923c; }

        .expense-actions {
            display: flex;
            gap: 8px;
        }

        .expense-actions button {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 8px;
            width: 38px;
            height: 38px;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .expense-actions button:hover {
            background: #4f46e5;
            border-color: #4f46e5;
            color: white;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
        }

        .page-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 8px 16px;
            color: #cbd5e1;
            cursor: pointer;
            font-weight: 500;
        }

        .page-btn.active {
            background: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="header">
            <div class="logo-area">
                <i class="fas fa-receipt"></i>
                <h1>Expense History</h1>
            </div>
            <div style="display: flex; gap: 10px;">
                <a href="add-expense.html" class="btn-primary"><i class="fas fa-plus"></i> Add expense</a>
                <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Dashboard</a>
            </div>
        </div>

        <!-- Filters -->
        <div class="filter-bar">
            <div class="filter-group">
                <label>From:</label>
                <input type="date" id="filterFrom">
            </div>
            <div class="filter-group">
                <label>To:</label>
                <input type="date" id="filterTo">
            </div>
            <div class="filter-group">
                <label>Category:</label>
                <select id="filterCategory">
                    <option value="">All</option>
                    <option value="groceries">Groceries</option>
                    <option value="rent">Rent</option>
                    <option value="electricity">Electricity</option>
                    <option value="water">Water</option>
                    <option value="internet">Internet</option>
                    <option value="gas">Gas</option>
                    <option value="dining">Dining</option>
                    <option value="entertainment">Entertainment</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Status:</label>
                <select id="filterStatus">
                    <option value="">All</option>
                    <option value="settled">Settled</option>
                    <option value="pending">Pending</option>
                </select>
            </div>
            <button class="btn-primary" onclick="applyFilters()"><i class="fas fa-search"></i> Apply</button>
            <button class="btn-secondary" onclick="resetFilters()"><i class="fas fa-undo"></i> Reset</button>
        </div>

        <!-- Expenses list -->
        <div id="expensesContainer" class="expenses-list">
            <div class="expense-row" style="justify-content: center;">Loading expenses...</div>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="pagination"></div>
    </div>

    <script>
        const host = window.location.hostname;
        const API_BASE = `http://${host}:5000/api`;
        
        let allExpenses = [];
        let filteredExpenses = [];
        let currentPage = 1;
        const itemsPerPage = 10;

        function isLoggedIn() {
            return localStorage.getItem('isLoggedIn') === 'true';
        }

        if (!isLoggedIn()) {
            window.location.href = 'index.html';
        }

        async function sessionFetch(url, options = {}) {
            if (!isLoggedIn()) {
                window.location.href = 'index.html';
                return null;
            }
            try {
                const response = await fetch(url, {
                    ...options,
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    }
                });
                if (response.status === 401) {
                    localStorage.removeItem('isLoggedIn');
                    localStorage.removeItem('user');
                    window.location.href = 'index.html';
                    return null;
                }
                return response;
            } catch (err) {
                console.error('Network error:', err);
                throw err;
            }
        }

        async function loadExpenses() {
            try {
                const res = await sessionFetch(`${API_BASE}/expenses`, { method: 'GET' });
                if (!res) return;
                
                const data = await res.json();
                if (data.success) {
                    allExpenses = data.data.expenses || [];
                    filteredExpenses = [...allExpenses];
                    renderExpenses();
                } else {
                    console.error('Failed to load expenses');
                }
            } catch (err) {
                console.error(err);
                document.getElementById('expensesContainer').innerHTML = '<div class="expense-row">Error loading expenses. Is backend running?</div>';
            }
        }

        function renderExpenses() {
            const container = document.getElementById('expensesContainer');
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageExpenses = filteredExpenses.slice(start, end);

            if (pageExpenses.length === 0) {
                container.innerHTML = '<div class="expense-row" style="justify-content: center;">No expenses found.</div>';
                renderPagination();
                return;
            }

            container.innerHTML = pageExpenses.map(exp => {
                const statusClass = exp.is_settled ? 'status-settled' : 'status-pending';
                const statusText = exp.is_settled ? 'Settled' : 'Pending';
                const date = new Date(exp.expense_date).toLocaleDateString();
                return `
                    <div class="expense-row" id="expense-${exp.expense_id}">
                        <div class="expense-description">
                            ${exp.description}
                            <div class="expense-category">${exp.category || 'other'}</div>
                        </div>
                        <div class="expense-amount">₹${exp.amount}</div>
                        <div class="expense-paidby"><i class="fas fa-user-circle"></i> ${exp.paid_by_name || 'Someone'}</div>
                        <div class="expense-date">${date}</div>
                        <div><span class="expense-status ${statusClass}">${statusText}</span></div>
                        <div class="expense-actions">
                            <button onclick="viewExpense(${exp.expense_id})" title="View details"><i class="fas fa-eye"></i></button>
                            ${!exp.is_settled ? `<button onclick="quickSettle(${exp.expense_id})" title="Settle"><i class="fas fa-hand-holding-usd"></i></button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredExpenses.length / itemsPerPage);
            const pagination = document.getElementById('pagination');
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            pagination.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            renderExpenses();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function applyFilters() {
            const fromDate = document.getElementById('filterFrom').value;
            const toDate = document.getElementById('filterTo').value;
            const category = document.getElementById('filterCategory').value;
            const status = document.getElementById('filterStatus').value;

            filteredExpenses = allExpenses.filter(exp => {
                if (fromDate && new Date(exp.expense_date) < new Date(fromDate)) return false;
                if (toDate) {
                    const end = new Date(toDate);
                    end.setDate(end.getDate() + 1);
                    if (new Date(exp.expense_date) > end) return false;
                }
                if (category && exp.category !== category) return false;
                if (status === 'settled' && !exp.is_settled) return false;
                if (status === 'pending' && exp.is_settled) return false;
                return true;
            });

            currentPage = 1;
            renderExpenses();
        }

        function resetFilters() {
            document.getElementById('filterFrom').value = '';
            document.getElementById('filterTo').value = '';
            document.getElementById('filterCategory').value = '';
            document.getElementById('filterStatus').value = '';
            filteredExpenses = [...allExpenses];
            currentPage = 1;
            renderExpenses();
        }

        function viewExpense(expenseId) {
            alert(`Viewing expense ${expenseId} details.`);
        }

        function quickSettle(expenseId) {
            window.location.href = `balances.html`;
        }

        loadExpenses();

        window.applyFilters = applyFilters;
        window.resetFilters = resetFilters;
        window.goToPage = goToPage;
    </script>
</body>
</html>
